name: panw-api-ollama

# Before first run:
#   cp .env.example .env        # then fill in SECURITY_API_KEY and SECURITY_PROFILE_NAME
#   mkdir -p openclaw-workspace # required for the openclaw bind-mount

services:

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    # Start ollama then pull the default model.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull llama2-uncensored:latest
        wait
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      # start_period covers the initial model download; increase for large models.
      start_period: 120s
      retries: 5

  # ── PANW security proxy ─────────────────────────────────────────────────────
  panw-api-ollama:
    image: ${PANW_API_IMAGE:-ghcr.io/paloaltonetworks/panw-api-ollama:latest}
    # Never pull from a registry — use locally-built panw-api-ollama:local
    # (pinned via PANW_API_IMAGE in .env). Prevents `docker compose up` from
    # silently replacing the locally-fixed image with the upstream ghcr tag.
    pull_policy: never
    build:
      context: ..
      dockerfile: ./Dockerfile
    container_name: panw-api-ollama
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=11435
      - SERVER_DEBUG_LEVEL=${SERVER_DEBUG_LEVEL:-INFO}
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECURITY_BASE_URL=${SECURITY_BASE_URL:-https://service.api.aisecurity.paloaltonetworks.com}
      - SECURITY_APP_NAME=${SECURITY_APP_NAME:-panw-api-ollama}
      - SECURITY_APP_USER=${SECURITY_APP_USER:-docker}
      - RUST_LOG=${RUST_LOG:-info}
      # Sensitive — loaded from .env via env_file above; listed here so Docker
      # Compose knows to pass them through if also set in the host shell.
      - SECURITY_API_KEY
      - SECURITY_PROFILE_NAME
      - SECURITY_CONTEXTUAL_GROUNDING_CONTEXT
    restart: unless-stopped

  # ── OpenClaw agent ──────────────────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    user: "0:0"
    depends_on:
      panw-api-ollama:
        condition: service_started
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/home/node/.openclaw
      # Host directory where the agent reads/writes files.
      # Create before starting: mkdir -p openclaw-workspace
      - ./openclaw-workspace:/home/node/workspace
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://panw-api-ollama:11435
      - OPENCLAW_HOME=/home/node/.openclaw
      - OPENCLAW_GATEWAY_BIND=all
      - OPENCLAW_GATEWAY_MODE=local
    restart: unless-stopped

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    # Pinned to v0.9.5. Override: WEBUI_DOCKER_TAG=v0.9.6 docker compose up -d
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-v0.9.5}
    container_name: open-webui
    depends_on:
      panw-api-ollama:
        condition: service_started
    ports:
      - ${OPEN_WEBUI_PORT:-3000}:8080
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://panw-api-ollama:11435
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
      - ENABLE_OPENAI_API=${ENABLE_OPENAI_API:-false}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  open-webui: {}
  openclaw-data: {}
